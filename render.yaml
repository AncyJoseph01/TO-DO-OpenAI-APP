services:
  - type: web
    name: second-brain-notion-agent
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn chatgpt_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NOTION_INTEGRATION_SECRET
        sync: false   # you will paste this in Render's dashboard
      - key: NOTION_DATABASE_ID
        sync: false   # you will paste this in Render's dashboard
